torrent_clients:
  qbittorrent:
    qui_proxy_url: ""
    use_tracker_as_tag: false
    qbit_tag: ""
    qbit_cat: ""
    # Optional qBittorrent overrides for dupe-check cross-seed torrents.
    # Normal upload injections continue to use qbit_tag/qbit_cat.
    qbit_cross_tag: ""
    qbit_cross_cat: ""
    # Optional qBittorrent staging mode: "", "hardlink", "reflink", or "symlink".
    # Reflink uses Linux FICLONE or Windows ReFS block cloning and requires source and linked_folder on the same supported filesystem.
    linking: ""
    allow_fallback: true
    linked_folder:
      - ""
    local_path:
      - ""
    remote_path:
      - ""
    # Enable qBittorrent automatic torrent management when the original save path matches an entry.
    # Automatic management stays disabled for hardlink, reflink, and symlink staging.
    automatic_management_paths:
      - ""
    verify_webui_certificate: true
